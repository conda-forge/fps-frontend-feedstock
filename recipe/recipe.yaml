schema_version: 1

context:
  version: "0.10.0"

package:
  name: fps-frontend
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/f/fps-frontend/fps_frontend-${{ version }}.tar.gz
    sha256: 57da88f25af2b6dd67af981d5bdb8f1854eb0eff8b81163ec3725b80781fd6c0

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - jupyverse-api >=0.14.0,<0.15.0

tests:
  - python:
      imports: fps_frontend
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/plugins/frontend
  summary: An FPS plugin for the frontend related configuration

extra:
  recipe-maintainers:
    - davidbrochart
